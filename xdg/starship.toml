# ~/.config/starship.toml
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$hostname\
$shlvl\
$singularity\
$kubernetes\
$nats\
$directory\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$hg_state\
$pijul_channel\
$docker_context\
$package\
$bun\
$c\
$cmake\
$cobol\
$cpp\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$fortran\
$gleam\
$golang\
$gradle\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$lua\
$maven\
$mojo\
$nim\
$nodejs\
$ocaml\
$odin\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$quarto\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$typst\
$vlang\
$vagrant\
$xmake\
$zig\
$buf\
$guix_shell\
$nix_shell\
$conda\
$pixi\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$direnv\
$env_var\
$mise\
$crystal\
$custom\
$sudo\
$line_break\
$jobs\
$battery\
$status\
$container\
$netns\
$shell\
$character"""

right_format = "$cmd_duration $time"

[directory]
truncate_to_repo = false
truncation_symbol = '…/'

[git_commit]
commit_hash_length = 8
tag_disabled = false

[git_metrics]
disabled = false

[fossil_branch]
disabled = false

[fossil_metrics]
disabled = false

[hg_branch]
disabled = false

[hg_state]
disabled = false

[hostname]
ssh_only = true

[jobs]
number_threshold = 1

[os]
disabled = false

[status]
disabled = false

[time]
time_format = "%T %Z"
format = " at 🕙 $time($style) "
disabled = false

[username]
style_user = "bold blue"
show_always = true
